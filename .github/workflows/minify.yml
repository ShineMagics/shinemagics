name: Minify Code
on: [push]

permissions:
  contents: write

jobs:
  minify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Minifiers
        run: npm install -g terser clean-css-cli

      - name: Run Minification
        run: |
          # Minify JS
          terser script.js -o script.js
          # Minify CSS
          cleancss -o style.css style.css

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add script.js style.css
          git commit -m "Optimize: Minify JS and CSS" || exit 0
          git push
